<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>CSSTransition example</title>
    <style>
      /* Custom class */
      .custom-class {
        color: white;
        background-color: tomato;
        padding: 1rem;
      }

      /* Transition classes */
      .alert-enter {
        opacity: 0;
        transform: scale(0.5);
      }
      .alert-enter-active {
        opacity: 1;
        transform: translateX(0);
        transition: opacity 300ms, transform 300ms;
      }
      .alert-enter-done,
      .alert-exit {
        opacity: 1;
      }
      .alert-exit-active {
        opacity: 0;
        transform: scale(0.5);
        transition: opacity 300ms, transform 300ms;
      }
      .alert-exit-done {
        opacity: 0;
      }

    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="./index.jsx"></script>
  </body>
</html>
